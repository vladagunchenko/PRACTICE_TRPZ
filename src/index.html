<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel = "stylesheet" href="css/navigation_bar.css">
    <link rel = "stylesheet" href="css/navigation_top.css">
    <link rel = "stylesheet" href="css/task_grid.css">
    <link rel = "stylesheet" href="css/editor.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <title>Тask management</title>
</head>
<body>
    <div class = "container">
        <div class = "left-panel active">
            <div class ="menu-btn"><img src="img/left.png" alt=" " class ="img-btn"></div>
            <div class = "head">
            <div class = "user-img">
                <img src="img/user.png" alt=" ">
            </div>
            <div class = "user-details">
                <p class = "title" data-lang="nameuser">Guest</p>
                <p class = "name" data-lang="emailuser">Not logged in</p>
            </div>
            </div>
            <div class ="nav">
<div class = "menu-top">
                <div class ="menu">
                    <p class = "title" data-lang="maintext">Main</p>
                    <ul>
                        <li class = "active">
                        <a href="#"><img src="img/archive.png" class = "icon">
                        <span class = "text" data-lang="archivetext">Archive</span>
                        </a>
                        </li>
                        <li class = "lang-menu">
                        <a href="#" class = "selected-lang" id="current-lang">
                            <img src="img/usa_flag.png" class = "icon-flag">ENG
                        </a> 
                        <ul class = "lang-list" id = "lang-list">
                           <li data-lang="ENG" data-src="img/usa_flag.png">
                            <a href="#"><img src="img/usa_flag.png" class="icon-flag">ENG</a>
                            </li>
                            <li data-lang="UA" data-src="img/ua_flag.png">
                            <a href="#"><img src="img/ua_flag.png" class="icon-flag">UA</a>
                            </li>
                        </ul>
                        </li>
                        </ul>
                    </div>
                        <div class ="menu">
                         <p class = "title" data-lang="settingtext">SETTING</p>
                         <ul>
                            <li class = "active">
                                <a href="#"><img src="img/setting.png" class = "icon">
                                <span class = "text" data-lang="settinguser">Setting</span>
                                </a>
                            </li>
                            <li class="mode">
                                <div class="moon-sun">
                                    <a href="#" id="dark">
                                        <img src="img/dark-theme.png" class="icon">
                                        <span class="text" data-lang="darktheme">Dark Mode</span>
                                    </a>
                                    <a href="#" id="light" style="display:none">
                                        <img src="img/light-theme.png" class="icon">
                                        <span class="text" data-lang="lighttheme">Light Mode</span>
                                    </a>
                                </div>
                            </li>
                        </ul>
                </div>
</div>
<div class = "menu-bottom">
                        <div class ="menu">
                         <p class = "title" data-lang="accounttext">ACCOUNT</p>
                         <ul>
                            <li onclick="addCardAbout()">
                                    <a href="#">
                                        <img src="img/info.png" class="icon">
                                        <span class="text">About</span>
                                    </a>
                                </li>
                            <li>
                                <a href="#"><img src="img/exit.png" class = "icon">
                                <span class = "text" data-lang="exituser">Exit</span>
                                </a>
                            </li>
                        </ul>
                        </div>
                        <div class="about_div">
                            <div class="about_f">
                                <button onclick="closeAbout()">X</button>
                            </div>
                        </div>

                </div>
            </div>
        </div>




        <div class = "container-top">
            <div class = "menu-top-div">
                <ul class = "menu-top-ul">
                    <li>
                        <a href = "#">
                        <img src="img/calendar.png" class = "icon">
                         <span class = "text-top" data-lang="calendar">Calendar</span>
                        </a>
                    </li>
                    <li>
                        <a href = "#">
                        <img src="img/clock.png"class = "icon">
                         <span class = "text-top" data-lang="today">Today</span>
                        </a>
                    </li>
                    <li onclick="exportAllTasks()">
                        <a href = "#">
                        <img src="img/sort.png" class = "icon">
                         <span class = "text-top" data-lang="sorting">Sorting</span>
                        </a>
                    </li>
                </ul>
                <div class = separator></div>
                <ul class = "menu-top-ul" onclick="addTaskCard()">
                    <li >
                        <a href = "#">
                        <img src="img/add.png" class = "icon" id = "open">
                         <span class = "text-top" data-lang="addtask">Add a task</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <!-- 
        <div class ="task-empty" data-task-empty>
            <p>Nothing</p>
            ВАЖНО #665647 НЕУДАЛЯЙ
        </div>-->

        <div class="task-grid-wrapper">
            <div class="ears-row">
                <div class="left-ear"></div>
                <div class="right-ear"></div>
            </div>
            <div class="task-card-scroll-area">
                <div class = "task-grid-container" id = "task-grid">
                </div>
            </div>
        </div>
</div>
        <div id="editor-overlay" class="overlay none">
            <div class="modal-content">
                <div class = "text-edit" >
                    <p data-lang="addtask" id="editor-mode">Adding a task</p>
                </div>

                <div class="editor-top">
                <input type="text" id="editor-title" data-lang-placeholder="tasktitle" placeholder="Task Title">
                <input type="datetime-local" id="editor-time" class="time-card"/>
                    </div>
                <div class="editor-toolbar">
                    <button id="btn-bold"><img src="img/bold.png" alt=" "></button>
                    <button id="btn-italic"><img src="img/italic.png" alt=" "></button>
                    <button id="btn-underline"><img src="img/underline.png" alt=" "></button>
                    <button id="btn-list"><img src="img/list.png" alt=" "></button>
                    <button id="btn-import"><img src="img/import.png" alt=" "></button>
                    <button id="btn-export"><img src="img/export.png" alt=" " onclick="exportAllTasks()"></button>
                </div>
                
                <div id="editor-area" contenteditable="true" data-lang-placeholder="enterdesc" data-placeholder="Enter description..."></div>

                <div class="modal-buttons">
                    <button id="editor-cancel" data-lang="canceltask" onclick="closeTaskCard()" >Cancel</button>
                    <button id="editor-save" data-lang="savetask">Save Task</button>
                </div>
            </div>
        </div>

        <div class ="container-about">
            <div class = "modal-about">

            </div>
        </div>

        <script src="js/task_store.js"></script>
        <script src="js/editor/task_render.js"></script>
        <script src="js/navigation_bar.js"></script>
        <script src="js/task_grid.js"></script>
        <script src="js/task_edit.js"></script>
</body>
</html>
